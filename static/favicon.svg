<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>
  <!-- Dharmachakra icon matching fa-dharmachakra -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="white" stroke-width="1.4"/>
  <circle cx="16" cy="16" r="3" fill="none" stroke="white" stroke-width="1.4"/>
  <circle cx="16" cy="16" r="1.2" fill="white"/>
  <!-- 8 spokes from inner to outer ring -->
  <line x1="16" y1="13" x2="16" y2="9" stroke="white" stroke-width="1.2"/>
  <line x1="16" y1="19" x2="16" y2="23" stroke="white" stroke-width="1.2"/>
  <line x1="13" y1="16" x2="9" y2="16" stroke="white" stroke-width="1.2"/>
  <line x1="19" y1="16" x2="23" y2="16" stroke="white" stroke-width="1.2"/>
  <line x1="13.9" y1="13.9" x2="11.1" y2="11.1" stroke="white" stroke-width="1.2"/>
  <line x1="18.1" y1="18.1" x2="20.9" y2="20.9" stroke="white" stroke-width="1.2"/>
  <line x1="18.1" y1="13.9" x2="20.9" y2="11.1" stroke="white" stroke-width="1.2"/>
  <line x1="13.9" y1="18.1" x2="11.1" y2="20.9" stroke="white" stroke-width="1.2"/>
  <!-- 8 outer dots -->
  <circle cx="16" cy="8" r="1.1" fill="white"/>
  <circle cx="16" cy="24" r="1.1" fill="white"/>
  <circle cx="8" cy="16" r="1.1" fill="white"/>
  <circle cx="24" cy="16" r="1.1" fill="white"/>
  <circle cx="10.3" cy="10.3" r="1.1" fill="white"/>
  <circle cx="21.7" cy="21.7" r="1.1" fill="white"/>
  <circle cx="21.7" cy="10.3" r="1.1" fill="white"/>
  <circle cx="10.3" cy="21.7" r="1.1" fill="white"/>
</svg>
